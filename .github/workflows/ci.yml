# KingdomWar CI/CD — GitHub Actions + game-ci
#
# SETUP:
# 1. Activate Unity locally, export license as UnityLicense.ulf
# 2. Add UNITY_LICENSE secret to GitHub repo Settings → Secrets
#
# License activation:
#   https://github.com/nicedoc/unity-activator

name: KingdomWar CI

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]

jobs:
  # ── Stage 1: Compile + EditMode Tests (200 tests) ──
  test-editmode:
    name: "EditMode Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: game-ci/unity-test-runner@v4
        with:
          unityVersion: 2022.3.57f1
          testMode: EditMode
          artifactsPath: test-results/editmode
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-editmode
          path: test-results/editmode

  # ── Stage 2: PlayMode Tests (60 tests) ──
  test-playmode:
    name: "PlayMode Tests"
    runs-on: ubuntu-latest
    needs: test-editmode
    steps:
      - uses: actions/checkout@v4

      - uses: game-ci/unity-test-runner@v4
        with:
          unityVersion: 2022.3.57f1
          testMode: PlayMode
          artifactsPath: test-results/playmode
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-playmode
          path: test-results/playmode

  # ── Stage 3: Windows Build ──
  build-windows:
    name: "Build Windows"
    runs-on: ubuntu-latest
    needs: test-playmode
    steps:
      - uses: actions/checkout@v4

      - uses: game-ci/unity-builder@v4
        with:
          unityVersion: 2022.3.57f1
          targetPlatform: StandaloneWindows64
          buildsPath: build

      - uses: actions/upload-artifact@v4
        with:
          name: KingdomWar-Windows
          path: build/StandaloneWindows64

  # ── Stage 4: Android Build (only on tags) ──
  build-android:
    name: "Build Android"
    runs-on: ubuntu-latest
    needs: test-playmode
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: game-ci/unity-builder@v4
        with:
          unityVersion: 2022.3.57f1
          targetPlatform: Android
          buildsPath: build

      - uses: actions/upload-artifact@v4
        with:
          name: KingdomWar-Android
          path: build/Android
