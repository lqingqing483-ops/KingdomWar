# KingdomWar CI/CD
#
# NOTES:
#   Unity tests require a local self-hosted runner with Unity installed.
#   If GitHub-hosted runners are used, Unity jobs will be skipped.
#   
#   To run Unity tests locally:
#     .\scripts\run-local-ci.ps1
#
#   GitHub secrets needed for Docker-based Unity:
#     - UNITY_LICENSE  (license file content)
#     - or UNITY_EMAIL + UNITY_PASSWORD + UNITY_SERIAL
#
#   See: https://game.ci/docs/github/activation

name: KingdomWar CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  # ── Config validation (always runs) ──
  validate-config:
    name: "Config Validation"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check essential files
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          
          for f in "opencode.json" "AGENTS.md" ".github/workflows/ci.yml"; do
            if [ -f "$f" ]; then
              echo "| $f | ✅ |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $f | ❌ Missing |" >> $GITHUB_STEP_SUMMARY
            fi
          done
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Local CI" >> $GITHUB_STEP_SUMMARY
          echo "Run Unity tests locally:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo '.\scripts\run-local-ci.ps1' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ── Unity EditMode Tests (requires license or self-hosted runner) ──
  test-editmode:
    name: "EditMode Tests"
    runs-on: self-hosted
    if: false  # Disabled until self-hosted runner network is fixed
    steps:
      - uses: actions/checkout@v4
      - name: Run EditMode Tests
        shell: pwsh
        run: .\scripts\ci.ps1 -Mode EditMode

  # ── Unity PlayMode Tests ──
  test-playmode:
    name: "PlayMode Tests"
    runs-on: self-hosted
    if: false
    needs: test-editmode
    steps:
      - uses: actions/checkout@v4
      - name: Run PlayMode Tests
        shell: pwsh
        run: .\scripts\ci.ps1 -Mode PlayMode

  # ── Windows Build ──
  build-windows:
    name: "Build Windows"
    runs-on: self-hosted
    if: false
    needs: test-playmode
    steps:
      - uses: actions/checkout@v4
      - name: Build Windows
        shell: pwsh
        run: |
          & "D:\yinyon\2022.3.57f1c2\Editor\Unity.exe" -batchmode -nographics `
            -projectPath "$env:GITHUB_WORKSPACE" `
            -buildTarget StandaloneWindows64 `
            -logFile "$env:RUNNER_TEMP\build.log"
