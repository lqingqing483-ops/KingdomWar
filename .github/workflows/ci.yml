name: KingdomWar CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test-editmode:
    name: "Compile + EditMode Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check files
        run: |
          echo "Repository cloned successfully"
          ls -la .github/workflows/
          echo "Unity project detected: $(ls *.sln 2>/dev/null || echo 'No .sln')"
