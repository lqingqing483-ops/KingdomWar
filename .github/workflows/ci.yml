# KingdomWar CI/CD
#
# Requirements:
#   GitHub Secrets → Settings → Secrets and variables → Actions
#   Required:
#     UNITY_EMAIL:     Unity account email
#     UNITY_PASSWORD:  Unity account password
#     UNITY_SERIAL:    Unity Personal serial (get from unity.com)
#
#   Or use UNITY_LICENSE: exported license file content
#
# License setup: https://game.ci/docs/github/activation

name: KingdomWar CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  # ── Non-Unity checks (always run, no license needed) ──

  validate-config:
    name: "Config Validation"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check opencode.json
        run: |
          if [ -f opencode.json ]; then
            echo "✅ opencode.json exists"
            cat opencode.json | python3 -c "import json,sys; json.load(sys.stdin); print('✅ JSON valid')"
          else
            echo "⚠️ opencode.json missing"
          fi
      - name: Check AGENTS.md
        run: |
          if [ -f AGENTS.md ]; then
            LINES=$(wc -l < AGENTS.md)
            echo "✅ AGENTS.md exists ($LINES lines)"
          else
            echo "⚠️ AGENTS.md missing"
          fi

  # ── Unity EditMode Tests ──
  test-editmode:
    name: "EditMode Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Activate Unity license (uses UNITY_EMAIL + UNITY_PASSWORD + UNITY_SERIAL secrets)
      - uses: game-ci/unity-activator@v2
        if: env.UNITY_EMAIL != '' && env.UNITY_SERIAL != ''
        continue-on-error: true
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}

      - uses: game-ci/unity-test-runner@v4
        with:
          unityVersion: 2022.3.57f1
          testMode: EditMode
          artifactsPath: test-results/editmode
          customParameters: -nographics
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-editmode
          path: test-results/editmode

  # ── Unity PlayMode Tests ──
  test-playmode:
    name: "PlayMode Tests"
    runs-on: ubuntu-latest
    needs: test-editmode
    steps:
      - uses: actions/checkout@v4

      - uses: game-ci/unity-activator@v2
        if: env.UNITY_EMAIL != '' && env.UNITY_SERIAL != ''
        continue-on-error: true
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}

      - uses: game-ci/unity-test-runner@v4
        with:
          unityVersion: 2022.3.57f1
          testMode: PlayMode
          artifactsPath: test-results/playmode
          customParameters: -nographics
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-playmode
          path: test-results/playmode

  # ── Windows Build ──
  build-windows:
    name: "Build Windows"
    runs-on: ubuntu-latest
    needs: test-playmode
    steps:
      - uses: actions/checkout@v4

      - uses: game-ci/unity-activator@v2
        if: env.UNITY_EMAIL != '' && env.UNITY_SERIAL != ''
        continue-on-error: true
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}

      - uses: game-ci/unity-builder@v4
        with:
          unityVersion: 2022.3.57f1
          targetPlatform: StandaloneWindows64
          buildsPath: build
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        with:
          name: KingdomWar-Windows
          path: build/StandaloneWindows64

  # ── Summary ──
  ci-summary:
    name: "CI Summary"
    runs-on: ubuntu-latest
    needs: [validate-config, test-editmode, test-playmode]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Config Validation | ✅ |" >> $GITHUB_STEP_SUMMARY

          # Check if Unity secrets are set
          if [ -n "${{ secrets.UNITY_LICENSE }}" ] || [ -n "${{ secrets.UNITY_SERIAL }}" ]; then
            echo "| Unity License | ✅ Configured |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Unity License | ❌ Not configured — set UNITY_LICENSE or UNITY_SERIAL+UNITY_EMAIL+UNITY_PASSWORD" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Setup Instructions" >> $GITHUB_STEP_SUMMARY
          echo '1. Go to Settings → Secrets and variables → Actions' >> $GITHUB_STEP_SUMMARY
          echo '2. Add UNITY_LICENSE (preferred) or UNITY_EMAIL + UNITY_PASSWORD + UNITY_SERIAL' >> $GITHUB_STEP_SUMMARY
          echo '3. Re-run this workflow' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See: https://game.ci/docs/github/activation" >> $GITHUB_STEP_SUMMARY
